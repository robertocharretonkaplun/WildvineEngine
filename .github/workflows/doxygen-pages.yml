name: Publish Doxygen Docs

on:
  push:
    branches:
      - main
      - master
      - "ForwardRendering+Shadows"
    paths:
      - ".github/workflows/doxygen-pages.yml"
      - "WildvineEngine/docs/doxygen/**"
      - "WildvineEngine/include/**"
      - "WildvineEngine/source/**"
      - "WildvineEngine/WildvineEngine.cpp"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate HTML documentation
        working-directory: WildvineEngine
        run: doxygen docs/doxygen/Doxyfile

      - name: Disable Jekyll for GitHub Pages
        run: touch WildvineEngine/docs/generated/html/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: WildvineEngine/docs/generated/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
